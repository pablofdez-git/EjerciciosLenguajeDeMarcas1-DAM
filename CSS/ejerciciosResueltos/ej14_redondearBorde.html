<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borde Redondo</title>
    <style>
        div {
            width: 25%;
            height: 100px;
            margin-left : 30px;
            margin-right: 30px;
            top : 30px;
            background-color: yellowgreen ;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            position: relative;
        }
    
        .BordeRedondo {
            transition-duration: 0.5s;
        }

        .BordeRedondo:hover {
            border-radius: 20px;
 
        }
    </style>
</head>
<body>
    
    <div class="BordeRedondo"><p><br>Contenido 1</p></div>
    <div class="BordeRedondo"><p><br>Contenido 2</p></div>
    <div class="BordeRedondo"><p><br>Contenido 3</p></div>

</body>
</html>
