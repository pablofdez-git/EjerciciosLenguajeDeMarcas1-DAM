<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borde Comprimido</title>
    <style>
        div {
            width: 25%;
            height: 100px;
            margin-left : 30px;
            margin-right: 30px;
            top : 30px;
            background-color: yellowgreen ;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            position: relative;
        }

        .BordeComprimido::before {
            content: '';
            position: absolute;
            border : 4px solid gray;
            left : -16px;
            top : -16px;
            right: -16px;
            bottom: -16px;
 
            transition-duration: 0.5s; /* Bajando esto da efecto de velocidad */
            opacity: 0;
        }

        .BordeComprimido:hover::before {
            top : -8px;
            left  : -8px;
            bottom : -8px;
            right : -8px;
            border : 4px solid gray;
            opacity: 1;;
        }
 
    </style>
</head>
<body>
    
    <div class="BordeComprimido"><p><br>Contenido 1</p></div>
    <div class="BordeComprimido"><p><br>Contenido 2</p></div>
    <div class="BordeComprimido"><p><br>Contenido 3</p></div>

</body>
</html>
