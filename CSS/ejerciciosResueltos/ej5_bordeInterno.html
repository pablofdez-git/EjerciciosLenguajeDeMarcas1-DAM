<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Borde Interno</title>
    <style>
        div {
            width: 25%;
            height: 100px;
            margin-left : 30px;
            margin-right: 30px;
            top : 30px;
            background-color: yellowgreen ;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            position: relative;
        }
    
        .bordeInterno {
            /* Nada */
    
        }

        .bordeInterno::before {
            content: '';
            position: absolute;
            border : 4px solid white;
            left : 4px;
            top : 4px;
            right: 4px;
            bottom: 4px;
            opacity: 0;
            transition-duration: 0.5s;
        }

        .bordeInterno:hover::before {
            opacity: 1;
        }
 
    

    </style>
</head>
<body>
    
<div class="bordeInterno"><p><br>Contenido 1</p></div>
<div class="bordeInterno"><p><br>Contenido 2</p></div>
<div class="bordeInterno"><p><br>Contenido 3</p></div>

</body>
</html>
