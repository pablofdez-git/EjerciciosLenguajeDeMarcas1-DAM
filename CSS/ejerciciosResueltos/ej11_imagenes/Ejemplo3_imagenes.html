<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 3 - Imagenes</title>
    <style>
        .img1 {
            width: 50%;
        }

        .img1:hover {
            transform: scaleX(-1);
        }

        .img2 {
            width: 50%;
        }

        .img2:hover {
            transform: scaleY(-1);
        }
    </style>
</head>

<body>

    <h2>Inversión en X</h2>

    <img class="img1" src="versailles.jpg" alt="Versalles">

    <h2>Inversión en Y</h2>

    <img class="img2" src="versailles.jpg" alt="Versalles">

</body>
</html>
