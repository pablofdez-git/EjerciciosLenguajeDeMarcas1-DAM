<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 1 - Imagenes</title>
    <style>

        .img1 {
            border-radius: 8px;
            display: block;
        }

        .img2 {
            border-radius: 50%;
            display: block;
        }

        .img3 {
            display: block;
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            width: 50%;
        }

        .img3:hover {
            box-shadow: 10px 10px 2px gray;
            transform: scale(1.1,1.1) translate(30px,0);
        }

        .img4 {
            display: block;
            width: 50%;
            height: auto;
        }

        .img5 {
            display: block;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
        }

        .img6 {
            display: block;
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            width: 50%;
            opacity: 0.5;
        }

        .img6:hover {
            box-shadow: 10px 10px 2px gray;
            transform: scale(1.1,1.1) translate(30px,0);
            opacity: 1;
        }

    </style>
</head>

<body>

    <h2>Imagen con bordes redondeados</h2>

    <img class="img1" src="versailles.jpg" alt="Versalles">

    <h2>Imagen en cuasi ojo de buey</h2>

    <img class="img2" src="versailles.jpg" alt="Versalles">

    <h2>Imagen encuadrada</h2>

    <img class="img3" src="versailles.jpg" alt="Versalles">

    <h2>Imagen responsive</h2>

    <img class="img4" src="versailles.jpg" alt="Versalles">

    <h2>Imagen centrada</h2>

    <img class="img5" src="versailles.jpg" alt="Versalles">

    <h2>Imagen opacidad</h2>

    <img class="img6" src="versailles.jpg" alt="Versalles">
    <br>
    <br>
    <br>

</body>
</html>
