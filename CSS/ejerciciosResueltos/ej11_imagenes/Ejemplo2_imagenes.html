<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 2 - Imagenes</title>
    <style>

        img {
            width: 50%;
        }

        .blur {
            filter: blur(4px);
        }

        .brightness {
            filter: brightness(250%);
        }

        .contrast {
            filter: contrast(180%);
        }

        .grayscale {
            filter: grayscale(100%);
        }

        .huerotate {
            filter: hue-rotate(180deg);
        }

        .invert {
            filter: invert(100%);
        }

        .opacity {
            filter: opacity(50%);
        }

        .saturate {
            filter: saturate(7);
        }

        .sepia {
            filter: sepia(100%);
        }

        .shadow {
            filter: drop-shadow(8px 8px 10px green);
        }
    </style>
</head>

<body>

    <h2>Imagen con filtro blur</h2>

    <img class="blur" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro brightness</h2>

    <img class="brightness" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro contrast</h2>

    <img class="contrast" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro grayscale</h2>

    <img class="grayscale" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro hue-rotate</h2>

    <img class="hue-rotate" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro invert</h2>

    <img class="invert" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro opacity</h2>

    <img class="opacity" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro saturate</h2>

    <img class="saturate" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro sepia</h2>

    <img class="sepia" src="versailles.jpg" alt="Versalles">

    <h2>Imagen con filtro shadow</h2>

    <img class="shadow" src="versailles.jpg" alt="Versalle">
</body>
</html>
