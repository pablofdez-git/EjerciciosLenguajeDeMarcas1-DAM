<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iluminacion</title>
    <style>
        div {
            width: 25%;
            height: 100px;
            margin-left : 30px;
            margin-right: 30px;
            top : 30px;
            background-color: yellowgreen ;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            position: relative;
        }
    
        .iluminacion {
            border : 4px solid gray; 
        }

        .iluminacion:hover {
            background: white;
        }
    </style>
</head>
<body>
    
    <div class="iluminacion"><p><br>Contenido Caja</p></div>

</body>
</html>
