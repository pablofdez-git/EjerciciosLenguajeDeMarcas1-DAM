<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="ej2_selectoresBasicos_style.css">
	<title>Selectores básicos</title>
</head>
<body>
	<h1>Resumen anual</h1>
	<br>
	<form action="">
		<input type="text" placeholder="Departamento">
		<input type="number" placeholder="Limite de ventas">
	</form>
	<br>
	<p id="introduccion">
		Durante la temporada los resultados han sido satisfactorios
	</p>
	<br>
	<table>
		<tr>
			<th>Ingresos</th>
			<th>Gastos</th>
			<th>Diferencia</th>
		</tr>
		<tr>
			<td>100</td>
			<td>50</td>
			<td class="positivo">50</td>
		</tr>
		<tr>
			<td>200</td>
			<td>190</td>
			<td class="position">10</td>
		</tr>
		<tr>
			<td>80</td>
			<td>180</td>
			<td class="negativo">-100</td>
		</tr>
	</table>
</body>
</html>
