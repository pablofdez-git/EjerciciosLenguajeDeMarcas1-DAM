<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botones</title>
    <style>

        .button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
        }

        .button1 {border-radius: 2px;}

        .button2 {border-radius: 4px;}

        .button3 {border-radius: 8px;}

        .button4 {border-radius: 12px;}

        .button5 {border-radius: 50%;}

        .button6:hover {
            background-color: blue; /* Green */
            color: white;
            box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24)
        }

    </style>
</head>

<body>

    <a href="#" class="button">Link ButtonA</a>
    <button class="button">ButtonB</button>
    <input type="button" class="button" value="Input ButtonC">
    
    <br>
    <br>

    <a href="#" class="button button1">Link ButtonD</a>
    <a href="#" class="button button2">Link ButtonE</a>
    <a href="#" class="button button3">Link ButtonF</a>
    <a href="#" class="button button4">Link ButtonG</a>
    <a href="#" class="button button5">Link ButtonH</a>

    <br>
    <br>

    <a href="#" class="button button6">Link ButtonI</a>

</body>
</html>
