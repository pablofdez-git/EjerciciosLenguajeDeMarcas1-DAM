<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borde Expandido</title>
    <style>
        div {
            width: 25%;
            height: 100px;
            margin-left : 30px;
            margin-right: 30px;
            top : 30px;
            background-color: yellowgreen ;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            position: relative;
        }

        .BordeExpandido::before {
            content: '';
            position: absolute;
            border : 4px solid gray;
            left : 0px;
            top : 0px;
            right: 0px;
            bottom: 0px;
 
            transition-duration: 0.5s;
        }

        .BordeExpandido:hover::before {
            top : -8px;
            left  : -8px;
            bottom : -8px;
            right : -8px;
            border : 4px solid gray;
        }

    </style>
</head>
<body>
    
    <div class="BordeExpandido"><p><br>Contenido 1</p></div>
    <div class="BordeExpandido"><p><br>Contenido 2</p></div>
    <div class="BordeExpandido"><p><br>Contenido 3</p></div>

</body>
</html>
