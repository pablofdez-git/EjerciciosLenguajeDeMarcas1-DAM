<!DOCTYPE html>

<html lang="es">
<head>
	<title>Ejemplo HTML+JS</title>
	<meta name="tipo_contenido" content="text/html" http-equiv="content-type" charset="UTF-8">

	<script>
		var txt = "Texto de prueba";
		document.write("<p>Negrita: " + txt.bold() + "</p>");
		document.write("<p>Italica: " + txt.italics() + "</p>");
		document.write("<p>Tachado: " + txt.strike() + "</p>");
		document.write("<p>Color fuente: " + txt.fontcolor("green") + "</p>");
	</script>
</head>

<body>

</body>
</html>
