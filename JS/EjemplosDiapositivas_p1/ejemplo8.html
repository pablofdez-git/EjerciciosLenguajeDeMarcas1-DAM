<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<title>JavaScript</title>
</head>
<body>
	<!-- Usando un elemento de imagen para el evento onload -->
	<img src="imagen.png" onload="alert('La imagen se ha cargado correctamente')"
							onerror="alert('Error al cargar la imagen')">
</body>
</html>
