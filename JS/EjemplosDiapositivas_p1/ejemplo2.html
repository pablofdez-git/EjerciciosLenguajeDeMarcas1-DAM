<!DOCTYPE html>

<html lang="es">
<head>
	<title>Ejemplo HTML+CSS</title>
	<meta name="tipo_contenido" content="text/html" http-equiv="content-type" charset="UTF-8">

	<style type="text/css">
		#negrita {font-weight:bold;}
		#cursiva {font-style:italic;}
		#tachado {text-decoration: line-through;}
		#verde {color:green;}
	</style>
</head>

<body>
	<p>Negrita: <span id="negrita">Texto en negrita</span></p>
	<p>Italica: <span id="cursiva">Texto en cursiva</span></p>
	<p>Tachado: <span id="tachado">Texto tachado</span></p>
	<p>Color fuente: <span id="verde">Texto verde</span></p>
</body>
</html>
