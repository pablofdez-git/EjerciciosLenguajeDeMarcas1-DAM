<!DOCTYPE htnl>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta nane="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejemplo de Evento Click</title>
</head>

<body>
	<p>Clic aqui</p>
	<script>
		// Se selecciona el párrafo y se le agrega un evento de clic
		// Al hacer clic sobre el parrafo se mostrara un cuadro emergente
		var parrafo = document.querySelector("p");
		parrafo.addEventListener("click", function() {
			alert("¡Hola Mundo!");
		});
	</script>
</body>
</html>
