<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Ejercicios Tema 4</title>
    </head>
    <body>
        <h1 id="titulo">Ejercicio 1 DOM</h1>
        <p id="parrafo">
            Lorem ipsum dolor sit amet consectetur adipiscing elit. 
        </p>
        <button id="boton1">Boton1</button>
        <button id="boton2">Boton2</button>
        <script>
            var titulo = document.getElementById("titulo");
            var parrafo = document.getElementById("parrafo");
            var boton1 = document.getElementById("boton1");
            var boton2 = document.getElementById("boton2");

            boton1.addEventListener("click", cambiarColor);
            boton2.addEventListener("click", cambiarTitulo);

            function cambiarColor(){
                titulo.style.color="red";
                parrafo.style.color="blue";
            }

            function cambiarTitulo(){
                titulo.textContent = "Título cambiado con JavaScript";
            }
        </script>
    </body>
</html>
