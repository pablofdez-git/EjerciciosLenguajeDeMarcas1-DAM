<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Actividad Propuesta 2.15</title>
    </head>
    <body>
        <h2>Lista destinos turísticos</h2>
        <form action="#" method="GET">
            <label id="destinos">Selecciona el destino</label>
            <br>
            <select name="Paises">
                <optgroup label="Europa">
                    <option value="P">Paris</option>
                    <option value="b">Berlín</option>
                    <option value="r">Roma</option>
                    <option value="a">Ámsterdam</option>
                </optgroup>
                <optgroup label="América">
                    <option value="rj">Rio de Janeiro</option>
                    <option value="lh">La Habana</option>
                    <option value="pc">Punta Cana</option>
                    <option value="ny">Nueva York</option>
                </optgroup>
                <optgroup label="África">
                    <option value="s">Sudáfrica</option>
                    <option value="k">Kenia</option>
                    <option value="t">Tanzania</option>
                    <option value="e">Egipto</option>
                </optgroup>
                <optgroup label="Asia">
                    <option value="v">Vietnam</option>
                    <option value="j">Japón</option>
                    <option value="c">China</option>
                    <option value="td">Tailandia</option>
                </optgroup>
                <optgroup label="Oceanía">
                    <option value="if">Islas Fiji</option>
                    <option value="aust">Austrália</option>
                    <option value="nz">Nueva Zelanda</option>
                </optgroup>
                <input type="submit">
            </select>
        </form>
    </body>
</html>
